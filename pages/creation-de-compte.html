<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Création de compte</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#C99F85]">
  <form action="processcreationcompte.php" method="post" enctype="multipart/form-data" onsubmit="return validerFormulaire()">
  <div class="min-h-screen flex justify-center items-center bg-[#C99F85]">
    <div class="bg-white w-full max-w-md rounded-xl shadow-lg p-8 flex flex-col gap-4">

      <h1 class="text-center md:text-4xl sm:text-3xl text-2xl text-[#5c3202] font-light font-serif mb-2">
        Créer un compte
      </h1>

      <div id="erreur" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded" role="alert">
        <span id="erreur-message">Tous les champs doivent être remplis !</span>
      </div>

      <div>
        <label class="block text-xl text-[#5c3202] font-serif font-light mb-1">Nom</label>
        <input id="nom" type="text" name="name"
          class="w-full p-2 border border-gray-300 rounded font-serif text-[#5c3202] placeholder-[#C99F85] focus:outline-none focus:ring-2 focus:ring-[#C99F85]"
          placeholder="votre nom complet" />
      </div>

      <div>
        <label class="block text-xl text-[#5c3202] font-serif font-light mb-1">Prénom</label>
        <input id="prenom" type="text" name="prenom"
          class="w-full p-2 border border-gray-300 rounded font-serif text-[#5c3202] placeholder-[#C99F85] focus:outline-none focus:ring-2 focus:ring-[#C99F85]"
          placeholder="votre prénom" />
      </div>

      <div>
        <label class="block text-xl text-[#5c3202] font-serif font-light mb-2">Tu es un ?</label>
        <div class="flex gap-8">
          <label class="flex items-center">
            <input id="client" type="radio" name="role" class="w-4 h-4" value="client"/>
            <span class="ml-2 text-[#5c3202] font-serif font-light text-xl">Client</span>
          </label>
          <label class="flex items-center">
            <input id="vendeur" type="radio" name="role" class="w-4 h-4" value="vendeur" />
            <span class="ml-2 text-[#5c3202] font-serif font-light text-xl" >Vendeur</span>
          </label>
        </div>
      </div>

      <div>
        <label class="block text-xl text-[#5c3202] font-serif font-light mb-1">Numéro de téléphone</label>
        <input id="telephone" type="tel" name="num"
          class="w-full p-2 border border-gray-300 rounded font-serif text-[#5c3202] placeholder-[#C99F85] focus:outline-none focus:ring-2 focus:ring-[#C99F85]"
          placeholder="votre numéro de téléphone" />
      </div>

      <div>
        <label class="block text-xl text-[#5c3202] font-serif font-light mb-1">Adresse Email</label>
        <input id="email" type="email" name="email"
          class="w-full p-2 border border-gray-300 rounded font-serif text-[#5c3202] placeholder-[#C99F85] focus:outline-none focus:ring-2 focus:ring-[#C99F85]"
          placeholder="votre adresse email" />
      </div>

      <div>
        <label class="block text-xl text-[#5c3202] font-serif font-light mb-1">Mot de passe</label>
        <input id="motdepasse" type="password" name="password"
          class="w-full p-2 border border-gray-300 rounded font-serif text-[#5c3202] placeholder-[#C99F85] focus:outline-none focus:ring-2 focus:ring-[#C99F85]"
          placeholder="votre mot de passe" />
      </div>

      <input type="submit" value=" S'inscrire"
        class="w-full bg-[#C99F85] text-white py-2 rounded font-serif text-xl font-light hover:bg-[#b08870] transition-colors">
      
      </form>

      <p class="text-base text-center text-[#5c3202] font-serif font-light">
        Déjà un compte ?
        <a href="connexion.html" class="text-[#C99F85] hover:underline">Se connecter</a>
      </p>

    </div>
  </div>
  
  <script>
function validerFormulaire() {
    const nom        = document.getElementById('nom').value.trim();
    const prenom     = document.getElementById('prenom').value.trim();
    const telephone  = document.getElementById('telephone').value.trim();
    const email      = document.getElementById('email').value.trim();
    const motdepasse = document.getElementById('motdepasse').value.trim();
    const role       = document.querySelector('input[name="role"]:checked');
    const erreurDiv  = document.getElementById('erreur');

    if (!nom || !prenom || !telephone || !email || !motdepasse || !role) {
        erreurDiv.classList.remove('hidden');
        return false; // bloque la soumission
    }

    return true; 
}
    
  </script>
</body>

</html>
