<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#C99F85]">
  <div class="min-h-screen flex justify-center items-center bg-[#C99F85]">
    <div class="bg-white w-full max-w-md rounded-xl shadow-lg p-9 flex flex-col gap-4">

      <h1 class="text-center md:text-4xl sm:text-3xl text-2xl text-[#5c3202] font-light font-serif mb-4">
        Connecter à votre compte
      </h1>

      <div>
        <label class="block text-xl text-[#5c3202] font-serif font-light mb-1">
          Adresse Email
        </label>
        <input type="email"
          class="w-full p-2 border border-gray-300 rounded font-serif text-[#5c3202] placeholder-[#C99F85] focus:outline-none focus:ring-2 focus:ring-[#C99F85]"
          placeholder="votre mail @mail.com" />
      </div>

      <div>
        <label class="block text-xl text-[#5c3202] font-serif font-light mb-1">
          Mot de passe
        </label>
        <input type="password"
          class="w-full p-2 border border-gray-300 rounded font-serif text-[#5c3202] focus:outline-none focus:ring-2 focus:ring-[#C99F85]" />
      </div>

      <button
        class="w-full bg-[#C99F85] text-white p-2 rounded font-serif text-xl font-light hover:bg-[#b08870] transition-colors">
        Se connecter
      </button>

      <p class="text-base text-center text-[#5c3202] font-serif font-light">
        Pas de compte ?
        <a href="creation-de-compte.html" class="text-[#C99F85] hover:underline">Créer un compte</a>
      </p>

    </div>
  </div>
</body>

</html>
