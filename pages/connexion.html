<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/input.css">
</head>
<body>
<div class="min-h-screen flex justify-center items-center" style="background-color: #f4e5d9;">
    <div class="bg-white w-full max-w-md rounded-xl shadow-lg p-9">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">
            Connectez-vous à votre compte
        </h1>

        <form id="loginForm" action="#" method="post">
            <div class="mb-4">
                <label for="email" class="block text-xl text-gray-600 mb-1">
                    Adresse Email
                </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-[#CF9B85]"
                    placeholder="votre mail @mail.com"
                    required
                />
                <div id="emailError" class="text-red-500 text-sm mt-1 hidden">Veuillez entrer une adresse email valide.</div>
            </div>

            <div class="mb-4">
                <label for="password" class="block text-xl text-gray-600 mb-1">
                    Mot de passe
                </label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-[#CF9B85] mb-2"
                    required
                />
                <div id="passwordError" class="text-red-500 text-sm mt-1 hidden">Le mot de passe est requis.</div>
            </div>

            <button
                type="submit"
                class="w-full bg-[#CF9B85] text-white p-2 rounded hover:bg-[#AC9B85] transition duration-200">
                Se connecter
            </button>
        </form>

        <div class="mt-4 text-center">
            <a href="#" class="text-sm text-[#CF9B85] hover:underline">Mot de passe oublié ?</a>
        </div>

        <p class="text-sm text-center text-gray-500 mt-4">
            Pas de compte ?
            <a href="creation-de-compte.html" class="text-[#CF9B85] hover:underline">Créer un compte</a>
        </p>
    </div>
</div>

<script src="../js/script.js"></script>
</body>
</html>
